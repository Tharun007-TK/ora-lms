services:
  - type: web
    name: ora-api
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Judge0 — public instance, no auth required.
      # TODO: re-enable for RapidAPI prod (JUDGE0_RAPIDAPI_KEY, JUDGE0_RAPIDAPI_HOST).
      - key: JUDGE0_API_URL
        value: https://ce.judge0.com
      - key: JUDGE0_WAIT
        value: "false"
      - key: JUDGE0_TIMEOUT_SECONDS
        value: "10"
      - key: REDIS_URL
        fromService:
          type: redis
          name: ora-redis
          property: connectionString

  - type: redis
    name: ora-redis
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
