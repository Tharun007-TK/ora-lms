<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ora — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          serif: ['"Instrument Serif"', 'Georgia', 'serif'],
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      }
    }
  };
</script>
<style>
  :root {
    /* core */
    --ink: #0A0A0A;
    --paper: #FAFAF5;
    --ember: #D85A30;

    /* gray ramp — interpolated OKLCH ink→paper */
    --gray-50:  #F3F2EC;
    --gray-100: #E6E4DC;
    --gray-200: #D3D1C7;
    --gray-300: #B8B6AC;
    --gray-400: #9C9A92;
    --gray-500: #7A7873;
    --gray-600: #58574F;
    --gray-700: #3D3D3A;
    --gray-800: #232321;
    --gray-900: #0A0A0A;

    /* functional */
    --info-fg: #185FA5; --info-bg: #E6F1FB; --info-text: #0C447C;
    --success-fg: #3B6D11; --success-bg: #EAF3DE; --success-text: #27500A;
    --warning-fg: #BA7517; --warning-bg: #FAEEDA; --warning-text: #633806;
    --danger-fg: #A32D2D; --danger-bg: #FCEBEB; --danger-text: #501313;

    /* surfaces */
    --surface: var(--paper);
    --surface-raised: #FFFFFF;
    --surface-sunken: #F3F2EC;
    --text-primary: var(--ink);
    --text-secondary: #3D3D3A;
    --text-muted: #9C9A92;
    --border: #D3D1C7;
    --border-strong: #B8B6AC;

    /* focus */
    --focus-ring: 0 0 0 3px rgba(216, 90, 48, 0.25);
    --elev-modal: 0 8px 24px rgba(10, 10, 10, 0.08);

    /* motion */
    --dur-fast: 120ms;
    --dur-base: 200ms;
    --dur-slow: 320ms;
    --ease: cubic-bezier(0.2, 0, 0, 1);
  }

  .dark {
    --paper: #0F0F0E;
    --surface: #0F0F0E;
    --surface-raised: #1A1A18;
    --surface-sunken: #080807;

    --gray-50:  #0F0F0E;
    --gray-100: #181816;
    --gray-200: #232321;
    --gray-300: #34332F;
    --gray-400: #58574F;
    --gray-500: #7A7873;
    --gray-600: #9C9A92;
    --gray-700: #B8B6AC;
    --gray-800: #D3D1C7;
    --gray-900: #FAFAF5;

    --text-primary: #FAFAF5;
    --text-secondary: #D3D1C7;
    --text-muted: #7A7873;
    --border: #34332F;
    --border-strong: #58574F;

    --info-fg: #6FA8DC; --info-bg: #0D2336; --info-text: #BFDAF1;
    --success-fg: #8DB86A; --success-bg: #162512; --success-text: #C9DDB4;
    --warning-fg: #D9A861; --warning-bg: #2B1F0E; --warning-text: #EBD3A4;
    --danger-fg: #D98080; --danger-bg: #2B1313; --danger-text: #EDC0C0;

    --elev-modal: 0 8px 24px rgba(0, 0, 0, 0.5);
  }

  html, body { background: var(--surface); color: var(--text-primary); }
  body {
    font-family: Inter, ui-sans-serif, system-ui;
    font-weight: 400;
    font-feature-settings: "cv11", "ss01";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* hairline borders */
  .border-hair { border: 0.5px solid var(--border); }
  .border-hair-b { border-bottom: 0.5px solid var(--border); }
  .border-hair-t { border-top: 0.5px solid var(--border); }
  .border-hair-r { border-right: 0.5px solid var(--border); }
  .border-hair-l { border-left: 0.5px solid var(--border); }

  /* ember focus ring util */
  .focus-ora:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  /* type scale */
  .t-display-xl { font-family: "Instrument Serif", serif; font-weight: 400; font-size: 72px; line-height: 1.02; letter-spacing: -0.02em; }
  .t-display-lg { font-family: "Instrument Serif", serif; font-weight: 400; font-size: 48px; line-height: 1.04; letter-spacing: -0.015em; }
  .t-h1 { font-size: 32px; line-height: 1.15; font-weight: 500; letter-spacing: -0.01em; }
  .t-h2 { font-size: 24px; line-height: 1.2; font-weight: 500; letter-spacing: -0.005em; }
  .t-h3 { font-size: 18px; line-height: 1.3; font-weight: 500; letter-spacing: 0; }
  .t-body { font-size: 14px; line-height: 1.5; font-weight: 400; }
  .t-body-sm { font-size: 13px; line-height: 1.45; font-weight: 400; }
  .t-caption { font-size: 12px; line-height: 1.4; font-weight: 400; color: var(--text-muted); }
  .t-label { font-size: 13px; line-height: 1.3; font-weight: 500; }
  .t-mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; line-height: 1.4; font-weight: 400; }
  .t-eyebrow { font-size: 11px; line-height: 1; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

  /* subtle scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 999px; border: 2px solid var(--surface); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gray-300); }

  /* loading spinner */
  @keyframes spin-ora { to { transform: rotate(360deg); } }
  .spin-ora { animation: spin-ora 600ms linear infinite; }

  /* toast slide in */
  @keyframes toast-in { from { transform: translateX(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .toast-in { animation: toast-in var(--dur-slow) var(--ease); }

  /* shimmer-free skeleton */
  @keyframes pulse-ora { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .pulse-ora { animation: pulse-ora 1.4s var(--ease) infinite; }

  /* section anchor offset for sticky subnav */
  section[id] { scroll-margin-top: 72px; }

  /* remove tap highlight */
  * { -webkit-tap-highlight-color: transparent; }

  /* Table tabular nums */
  .tnum { font-variant-numeric: tabular-nums; }

  /* Placeholder hatch for "drop image here" */
  .hatch {
    background-image: repeating-linear-gradient(135deg, var(--gray-100) 0 6px, transparent 6px 12px);
  }
  .dark .hatch {
    background-image: repeating-linear-gradient(135deg, var(--gray-200) 0 6px, transparent 6px 12px);
  }

  /* ===== Print ===== */
  @page { size: A4 portrait; margin: 14mm 12mm; }
  @media print {
    :root { color-scheme: light; }
    html, body {
      background: #FAFAF5 !important;
      color: #0A0A0A !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      animation: none !important;
      transition: none !important;
    }
    /* Force light mode on print regardless of toggle */
    html.dark { /* ignore dark overrides */ }
    html.dark body { background: #FAFAF5 !important; color: #0A0A0A !important; }

    /* Hide interactive chrome that doesn't belong in print */
    .print-hide, [data-print-hide] { display: none !important; }

    /* Stop sticky nav from covering content in print */
    .sticky { position: static !important; }
    header.sticky, .sticky { backdrop-filter: none !important; }

    /* No scrollbars in print */
    ::-webkit-scrollbar { display: none; }

    /* Layout: let content expand, no viewport caps */
    .overflow-auto, .overflow-hidden { overflow: visible !important; }
    [style*="height:"] { height: auto !important; }
    [style*="max-height"] { max-height: none !important; }

    /* Break control */
    section[id] {
      break-before: page;
      page-break-before: always;
    }
    section[id]:first-of-type {
      break-before: auto;
      page-break-before: auto;
    }
    .avoid-break, .border-hair, table, .rounded-lg, .rounded-xl {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    tr, li { break-inside: avoid; page-break-inside: avoid; }
    h1, h2, h3, .t-h1, .t-h2, .t-h3, .t-display-xl, .t-display-lg {
      break-after: avoid;
      page-break-after: avoid;
    }

    /* Sidebar + app shell — collapse heights so nothing clips */
    aside { break-inside: avoid; }

    /* Shrink hero slightly so it fits a page */
    .t-display-xl { font-size: 54px !important; line-height: 1.05 !important; }

    /* Scale content to fit the narrower print column */
    .max-w-\[1240px\] { max-width: 100% !important; }
  }
</style>
</head>
<body class="antialiased">
<style>
  @media print {
    /* Hide the sticky top bar entirely — it's navigation only */
    body > div > div:first-child.sticky { display: none !important; }
    /* Force light tokens even if dark was toggled */
    html, html.dark {
      --paper:#FAFAF5; --surface:#FAFAF5; --surface-raised:#FFFFFF; --surface-sunken:#F3F2EC;
      --text-primary:#0A0A0A; --text-secondary:#3D3D3A; --text-muted:#9C9A92;
      --border:#D3D1C7; --border-strong:#B8B6AC;
      --gray-50:#F3F2EC; --gray-100:#E6E4DC; --gray-200:#D3D1C7; --gray-300:#B8B6AC;
      --gray-400:#9C9A92; --gray-500:#7A7873; --gray-600:#58574F; --gray-700:#3D3D3A;
      --gray-800:#232321; --gray-900:#0A0A0A;
      --info-fg:#185FA5; --info-bg:#E6F1FB; --info-text:#0C447C;
      --success-fg:#3B6D11; --success-bg:#EAF3DE; --success-text:#27500A;
      --warning-fg:#BA7517; --warning-bg:#FAEEDA; --warning-text:#633806;
      --danger-fg:#A32D2D; --danger-bg:#FCEBEB; --danger-text:#501313;
    }
  }
</style>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./src/icons.jsx"></script>
<script type="text/babel" src="./src/primitives.jsx"></script>
<script type="text/babel" src="./src/tokens.jsx"></script>
<script type="text/babel" src="./src/components.jsx"></script>
<script type="text/babel" src="./src/templates.jsx"></script>
<script type="text/babel" src="./src/app.jsx"></script>

<script>
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}
    // Wait until React has rendered content into #root
    const waitForRoot = () => new Promise((resolve) => {
      const tick = () => {
        const root = document.getElementById('root');
        if (root && root.childElementCount > 0) return resolve();
        requestAnimationFrame(tick);
      };
      tick();
    });
    await waitForRoot();
    // Force light mode for print regardless of persisted toggle
    document.documentElement.classList.remove('dark');
    // Small settle delay for Babel-transformed scripts + layout
    await new Promise(r => setTimeout(r, 900));
    window.print();
  })();
</script>
</body>
</html>
